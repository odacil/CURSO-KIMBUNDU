<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;


// Shim de storage: usa localStorage do browser
const browserStorage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v === null ? null : { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true };
  }
};
if (typeof window !== 'undefined') window.storage = window.storage || browserStorage;

// Síntese de voz: usa voz portuguesa para aproximar pronúncia do Kimbundu
const KbTTS = {
  speak(text, opts = {}) {
    if (!('speechSynthesis' in window)) return false;
    // Cancelar qualquer fala em curso
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    // Procurar voz portuguesa
    const voices = window.speechSynthesis.getVoices();
    const ptVoice = voices.find(v => v.lang === 'pt-PT') 
                 || voices.find(v => v.lang === 'pt-BR') 
                 || voices.find(v => v.lang.startsWith('pt'));
    if (ptVoice) utter.voice = ptVoice;
    utter.lang = ptVoice ? ptVoice.lang : 'pt-PT';
    utter.rate = opts.rate || 0.85; // mais lento por defeito
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
    return true;
  },
  // Pre-carregar vozes (alguns browsers carregam async)
  init() {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
    }
  }
};
KbTTS.init();

function KimbunduApp() {
  const [view, setView] = useState('home');
  const [selectedAula, setSelectedAula] = useState(null);
  const [progress, setProgress] = useState({ studiedCards: [], quizScores: [], streak: 0, lastVisit: null });
  const [userName, setUserNameState] = useState('');
  const [showNamePrompt, setShowNamePrompt] = useState(false);
  const [loading, setLoading] = useState(true);

  const setUserName = async (name) => {
    setUserNameState(name);
    try {
      await window.storage.set('kimbundu_username', name);
    } catch (e) {}
  };

  // Carregar progresso ao iniciar
  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get('kimbundu_progress');
        if (result && result.value) {
          setProgress(JSON.parse(result.value));
        }
      } catch (e) {
        // primeira vez ou erro — usa default
      }
      try {
        const nameResult = await window.storage.get('kimbundu_username');
        if (nameResult && nameResult.value) {
          setUserNameState(nameResult.value);
        } else {
          setShowNamePrompt(true);
        }
      } catch (e) {
        setShowNamePrompt(true);
      }
      setLoading(false);
    })();
  }, []);

  // Salvar progresso quando muda
  const saveProgress = async (newProgress) => {
    setProgress(newProgress);
    try {
      await window.storage.set('kimbundu_progress', JSON.stringify(newProgress));
    } catch (e) {
      console.error('Erro a guardar progresso:', e);
    }
  };

  const markCardStudied = (cardKey) => {
    if (!progress.studiedCards.includes(cardKey)) {
      saveProgress({ ...progress, studiedCards: [...progress.studiedCards, cardKey] });
    }
  };

  const recordQuiz = (score, total) => {
    const newScores = [...progress.quizScores, { score, total, date: new Date().toISOString() }];
    saveProgress({ ...progress, quizScores: newScores });
  };

  const resetProgress = async () => {
    const fresh = { studiedCards: [], quizScores: [], streak: 0, lastVisit: null };
    saveProgress(fresh);
    try {
      await window.storage.delete('kimbundu_username');
    } catch (e) {}
    setUserNameState('');
    setShowNamePrompt(true);
  };

  if (loading) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '60vh', color: '#d4a574', fontFamily: 'Georgia, serif' }}>
        Carregando…
      </div>
    );
  }

  return (
    <div className="kb-app">
      <style>{STYLES}</style>
      {showNamePrompt && (
        <NamePrompt onSave={(name) => {
          setUserName(name);
          setShowNamePrompt(false);
        }} onSkip={() => setShowNamePrompt(false)} />
      )}
      <Header view={view} setView={setView} progress={progress} />
      <main className="kb-main">
        {view === 'home' && <Home setView={setView} progress={progress} setSelectedAula={setSelectedAula} userName={userName} setUserName={setUserName} />}
        {view === 'aulas' && <AulasList setSelectedAula={(a) => { setSelectedAula(a); setView('aula'); }} />}
        {view === 'aula' && selectedAula !== null && (
          <AulaDetail aula={AULAS[selectedAula]} back={() => setView('aulas')} />
        )}
        {view === 'flashcards' && (
          <Flashcards markStudied={markCardStudied} studied={progress.studiedCards} />
        )}
        {view === 'quiz' && <Quiz recordQuiz={recordQuiz} />}
        {view === 'dicionario' && <Dicionario />}
        {view === 'verbos' && <Verbos />}
        {view === 'frases' && <Frases />}
        {view === 'treino' && <TreinoDiario markStudied={markCardStudied} />}
        {view === 'progresso' && <Progresso progress={progress} reset={resetProgress} />}
      </main>
      <footer className="kb-footer">
        <span>Xalenu kyambote! · Mungu say dingi!</span>
      </footer>
    </div>
  );
}

function Flashcards({ markStudied, studied }) {
  const [category, setCategory] = useState('all');
  const [direction, setDirection] = useState('kb-pt'); // ou 'pt-kb'
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);

  const cards = useMemo(() => {
    if (category === 'all') return ALL_VOCAB;
    return VOCAB[category] || [];
  }, [category]);

  useEffect(() => {
    setIdx(0);
    setFlipped(false);
  }, [category, direction]);

  if (cards.length === 0) return <div>Sem cartões.</div>;

  const card = cards[idx];
  const front = direction === 'kb-pt' ? card.kb : card.pt;
  const back = direction === 'kb-pt' ? card.pt : card.kb;
  const cardKey = `${card.kb}|${card.pt}`;
  const isStudied = studied.includes(cardKey);

  const next = () => {
    if (!isStudied) markStudied(cardKey);
    setFlipped(false);
    setIdx((i) => (i + 1) % cards.length);
  };
  const prev = () => {
    setFlipped(false);
    setIdx((i) => (i - 1 + cards.length) % cards.length);
  };

  const cats = ['all', ...Object.keys(VOCAB)];
  const catLabels = {
    all: 'Tudo',
    saudacoes: 'Saudações',
    numeros: 'Números',
    familia: 'Família',
    corpo: 'Corpo',
    tempo: 'Tempo',
    comidaBebida: 'Comida & Bebida',
    animais: 'Animais',
    cores: 'Cores',
    pronomes: 'Pronomes',
    outras: 'Outras',
  };

  return (
    <div className="kb-flashcards">
      <h2 className="kb-page-title">Flashcards</h2>
      <p className="kb-page-sub">Clica no cartão para virar. Avança quando souberes.</p>

      <div className="kb-controls">
        <div className="kb-control-group">
          <label className="kb-label">Categoria</label>
          <select className="kb-select" value={category} onChange={(e) => setCategory(e.target.value)}>
            {cats.map(c => <option key={c} value={c}>{catLabels[c]} ({c === 'all' ? ALL_VOCAB.length : VOCAB[c].length})</option>)}
          </select>
        </div>
        <div className="kb-control-group">
          <label className="kb-label">Direção</label>
          <div className="kb-toggle">
            <button className={direction === 'kb-pt' ? 'active' : ''} onClick={() => setDirection('kb-pt')}>Kimbundu → PT</button>
            <button className={direction === 'pt-kb' ? 'active' : ''} onClick={() => setDirection('pt-kb')}>PT → Kimbundu</button>
          </div>
        </div>
      </div>

      <div className="kb-flashcard-area">
        <div className="kb-flashcard-meta">
          <span>{idx + 1} / {cards.length}</span>
          {isStudied && <span className="kb-tag">✓ estudada</span>}
          <span className="kb-tag-cat">{card.cat}</span>
        </div>
        <button className={`kb-flashcard ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(f => !f)}>
          <div className="kb-flashcard-inner">
            <div className="kb-flashcard-side kb-flashcard-front">
              <div className="kb-flashcard-hint">{direction === 'kb-pt' ? 'Kimbundu' : 'Português'}</div>
              <div className="kb-flashcard-text">{front}</div>
              {direction === 'kb-pt' && <div className="kb-flashcard-speak"><SpeakButton text={card.kb} size="big" /></div>}
              <div className="kb-flashcard-tip">Clica para ver a tradução</div>
            </div>
            <div className="kb-flashcard-side kb-flashcard-back">
              <div className="kb-flashcard-hint">{direction === 'kb-pt' ? 'Português' : 'Kimbundu'}</div>
              <div className="kb-flashcard-text">{back}</div>
              {direction === 'pt-kb' && <div className="kb-flashcard-speak"><SpeakButton text={card.kb} size="big" /></div>}
              <div className="kb-flashcard-tip">Clica para voltar</div>
            </div>
          </div>
        </button>
        <div className="kb-flashcard-nav">
          <button className="kb-btn" onClick={prev}>← Anterior</button>
          <button className="kb-btn kb-btn-primary" onClick={next}>Próxima →</button>
        </div>
      </div>
    </div>
  );
}

function Quiz({ recordQuiz }) {
  const [stage, setStage] = useState('setup'); // setup, playing, done
  const [direction, setDirection] = useState('kb-pt');
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [feedback, setFeedback] = useState(null);

  const start = () => {
    const shuffled = [...ALL_VOCAB].sort(() => Math.random() - 0.5).slice(0, 10);
    const qs = shuffled.map((item) => {
      const distractors = ALL_VOCAB
        .filter(v => v.kb !== item.kb)
        .sort(() => Math.random() - 0.5)
        .slice(0, 3);
      const options = [...distractors, item].sort(() => Math.random() - 0.5);
      return {
        prompt: direction === 'kb-pt' ? item.kb : item.pt,
        correct: direction === 'kb-pt' ? item.pt : item.kb,
        options: options.map(o => direction === 'kb-pt' ? o.pt : o.kb)
      };
    });
    setQuestions(qs);
    setCurrent(0);
    setScore(0);
    setSelected(null);
    setFeedback(null);
    setStage('playing');
  };

  const answer = (option) => {
    if (selected) return;
    setSelected(option);
    if (option === questions[current].correct) {
      setScore(s => s + 1);
      setFeedback('correct');
    } else {
      setFeedback('wrong');
    }
  };

  const nextQ = () => {
    if (current + 1 >= questions.length) {
      recordQuiz(score, questions.length);
      setStage('done');
    } else {
      setCurrent(c => c + 1);
      setSelected(null);
      setFeedback(null);
    }
  };

  if (stage === 'setup') {
    return (
      <div className="kb-quiz">
        <h2 className="kb-page-title">Quiz</h2>
        <p className="kb-page-sub">10 perguntas para testares os teus conhecimentos.</p>
        <div className="kb-controls">
          <div className="kb-control-group">
            <label className="kb-label">Direção</label>
            <div className="kb-toggle">
              <button className={direction === 'kb-pt' ? 'active' : ''} onClick={() => setDirection('kb-pt')}>Kimbundu → PT</button>
              <button className={direction === 'pt-kb' ? 'active' : ''} onClick={() => setDirection('pt-kb')}>PT → Kimbundu</button>
            </div>
          </div>
        </div>
        <button className="kb-btn kb-btn-primary kb-btn-big" onClick={start}>Começar quiz</button>
      </div>
    );
  }

  if (stage === 'done') {
    const pct = Math.round((score / questions.length) * 100);
    let msg;
    if (pct >= 90) msg = "Excelente! Quase perfeito.";
    else if (pct >= 70) msg = "Muito bem! Continua assim.";
    else if (pct >= 50) msg = "Bom esforço — revê os flashcards.";
    else msg = "Sem stress — pratica mais e tenta de novo.";
    return (
      <div className="kb-quiz kb-quiz-done">
        <h2 className="kb-page-title">Resultado</h2>
        <div className="kb-result-score">{score}<span>/{questions.length}</span></div>
        <div className="kb-result-pct">{pct}%</div>
        <p className="kb-result-msg">{msg}</p>
        <button className="kb-btn kb-btn-primary" onClick={start}>Novo quiz</button>
        <button className="kb-btn" onClick={() => setStage('setup')}>Voltar</button>
      </div>
    );
  }

  const q = questions[current];
  return (
    <div className="kb-quiz">
      <div className="kb-quiz-meta">
        <span>Pergunta {current + 1} de {questions.length}</span>
        <span>Acertos: {score}</span>
      </div>
      <div className="kb-quiz-bar">
        <div className="kb-quiz-bar-fill" style={{ width: `${((current) / questions.length) * 100}%` }} />
      </div>
      <div className="kb-quiz-card">
        <div className="kb-quiz-hint">Qual a tradução de:</div>
        <div className="kb-quiz-prompt">
          <span>{q.prompt}</span>
          {direction === 'kb-pt' && <SpeakButton text={q.prompt} size="normal" />}
        </div>
        <div className="kb-quiz-options">
          {q.options.map((opt, i) => {
            const isCorrect = selected && opt === q.correct;
            const isWrong = selected === opt && opt !== q.correct;
            return (
              <button
                key={i}
                className={`kb-quiz-option ${isCorrect ? 'correct' : ''} ${isWrong ? 'wrong' : ''} ${selected ? 'disabled' : ''}`}
                onClick={() => answer(opt)}
                disabled={!!selected}
              >
                {opt}
              </button>
            );
          })}
        </div>
        {feedback && (
          <div className={`kb-feedback ${feedback}`}>
            {feedback === 'correct' ? '✓ Correto!' : `✗ Resposta certa: ${q.correct}`}
            <button className="kb-btn kb-btn-primary" onClick={nextQ}>
              {current + 1 >= questions.length ? 'Ver resultado' : 'Próxima'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// DICIONÁRIO
// ============================================================
function Dicionario() {
  const [query, setQuery] = useState('');
  const [filterCat, setFilterCat] = useState('all');

  const filtered = useMemo(() => {
    const q = query.toLowerCase().trim();
    return ALL_VOCAB.filter(v => {
      if (filterCat !== 'all' && v.cat !== filterCat) return false;
      if (!q) return true;
      return v.kb.toLowerCase().includes(q) || v.pt.toLowerCase().includes(q);
    });
  }, [query, filterCat]);

  const cats = ['all', ...new Set(ALL_VOCAB.map(v => v.cat))];

  return (
    <div className="kb-dic">
      <h2 className="kb-page-title">Dicionário</h2>
      <p className="kb-page-sub">{ALL_VOCAB.length} palavras das 9 aulas. Pesquisa em Kimbundu ou Português.</p>
      <div className="kb-controls">
        <input
          className="kb-input"
          placeholder="Pesquisar… (ex: água, mama, leão)"
          value={query}
          onChange={(e) => setQuery(e.target.value)}
        />
        <select className="kb-select" value={filterCat} onChange={(e) => setFilterCat(e.target.value)}>
          {cats.map(c => <option key={c} value={c}>{c === 'all' ? 'Todas categorias' : c}</option>)}
        </select>
      </div>
      <div className="kb-dic-results">
        <div className="kb-dic-count">{filtered.length} resultado{filtered.length !== 1 ? 's' : ''}</div>
        <div className="kb-dic-list">
          {filtered.map((v, i) => (
            <div key={i} className="kb-dic-item">
              <div className="kb-dic-kb">
                <SpeakButton text={v.kb} size="small" />
                <span>{v.kb}</span>
              </div>
              <div className="kb-dic-pt">{v.pt}</div>
              <span className="kb-dic-cat">{v.cat}</span>
            </div>
          ))}
          {filtered.length === 0 && <div className="kb-empty">Nenhuma palavra encontrada.</div>}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// VERBOS

              <h4>Passado</h4>
              <ul>

// ============================================================
// FRASES
// ============================================================
function Frases() {

  const topics = [...new Set(FRASES.map(f => f.topic))];

  return (
    <div className="kb-frases">
      <h2 className="kb-page-title">Frases úteis</h2>
      <p className="kb-page-sub">Tenta dizer em português antes de revelar — boa prática.</p>
      {topics.map(t => (

              return (

// ============================================================
// TREINO DIÁRIO
// ============================================================
function TreinoDiario({ markStudied }) {
  const [round, setRound] = useState(0); // forçar re-roll
  const [revealed, setRevealed] = useState({});

  const palavras = useMemo(() => {
    return [...ALL_VOCAB].sort(() => Math.random() - 0.5).slice(0, 10);
  }, [round]);

  const reveal = (i, card) => {
    setRevealed(r => ({ ...r, [i]: true }));
    markStudied(`${card.kb}|${card.pt}`);
  };

  return (
    <div className="kb-treino">
      <h2 className="kb-page-title">Treino diário</h2>
      <p className="kb-page-sub">10 palavras aleatórias. Tenta dizer em português antes de revelar.</p>
      <button className="kb-btn" onClick={() => { setRound(r => r + 1); setRevealed({}); }}>↻ Novas palavras</button>
      <div className="kb-treino-list">
        {palavras.map((p, i) => (
          <div key={`${round}-${i}`} className="kb-treino-item">
            <div className="kb-treino-num">{i + 1}</div>
            <div className="kb-treino-kb">
              <SpeakButton text={p.kb} size="small" />
              <span>{p.kb}</span>
            </div>
            {revealed[i] ? (
              <div className="kb-treino-pt">{p.pt}</div>
            ) : (
              <button className="kb-btn kb-btn-small" onClick={() => reveal(i, p)}>Revelar</button>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================================
// PROGRESSO
// ============================================================
function Progresso({ progress, reset }) {
  const totalCards = ALL_VOCAB.length;
  const studied = progress.studiedCards.length;
  const pct = Math.round((studied / totalCards) * 100);
  const quizScores = progress.quizScores;
  const avg = quizScores.length > 0
    ? Math.round((quizScores.reduce((sum, q) => sum + (q.score / q.total) * 100, 0) / quizScores.length))
    : 0;

  const [confirmReset, setConfirmReset] = useState(false);

  return (
    <div className="kb-progresso">
      <h2 className="kb-page-title">O teu progresso</h2>
      <p className="kb-page-sub">Tudo guardado localmente no teu browser.</p>

      <div className="kb-stats">
        <div className="kb-stat">
          <div className="kb-stat-value">{studied}/{totalCards}</div>
          <div className="kb-stat-label">Palavras vistas em flashcards</div>
          <div className="kb-bar"><div className="kb-bar-fill" style={{ width: `${pct}%` }} /></div>
          <div className="kb-stat-pct">{pct}%</div>
        </div>
        <div className="kb-stat">
          <div className="kb-stat-value">{quizScores.length}</div>
          <div className="kb-stat-label">Quizzes realizados</div>
          <div className="kb-stat-pct">Média: {avg}%</div>
        </div>
      </div>

      {quizScores.length > 0 && (
        <section>
          <h3 className="kb-section-title">Histórico de quizzes</h3>
          <div className="kb-quiz-history">
            {[...quizScores].reverse().map((q, i) => (
              <div key={i} className="kb-quiz-history-item">
                <span>{new Date(q.date).toLocaleString('pt-PT')}</span>
                <span className="kb-quiz-history-score">{q.score}/{q.total}</span>
                <span>({Math.round((q.score / q.total) * 100)}%)</span>
              </div>
            ))}
          </div>
        </section>
      )}

      <section style={{ marginTop: '3rem' }}>
        <h3 className="kb-section-title">Recomeçar</h3>
        {!confirmReset ? (
          <button className="kb-btn" onClick={() => setConfirmReset(true)}>Apagar o meu progresso</button>
        ) : (
          <div className="kb-confirm">
            <p>Tens a certeza? Vais perder tudo.</p>
            <button className="kb-btn kb-btn-danger" onClick={() => { reset(); setConfirmReset(false); }}>Sim, apagar</button>
            <button className="kb-btn" onClick={() => setConfirmReset(false)}>Cancelar</button>
          </div>
        )}
      </section>
    </div>
  );
}






// Botão reutilizável para falar uma palavra/frase
function SpeakButton({ text, size = 'normal', label = 'Ouvir pronúncia' }) {
  const [speaking, setSpeaking] = useState(false);
  const handleClick = (e) => {
    e.stopPropagation();
    setSpeaking(true);
    KbTTS.speak(text);
    setTimeout(() => setSpeaking(false), Math.max(1000, text.length * 80));
  };
  const cls = `kb-speak ${size === 'small' ? 'kb-speak-small' : ''} ${size === 'big' ? 'kb-speak-big' : ''} ${speaking ? 'speaking' : ''}`;
  return (
    <button className={cls} onClick={handleClick} aria-label={label} title={label}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
    </button>
  );
}

}

// ============================================================
// TRADUTOR DE IDADE
// ============================================================
const NUMS_KB = {
  0: "hatu", 1: "moxi", 2: "yadi", 3: "tatu", 4: "wana", 5: "tanu",
  6: "samanu", 7: "sambwadi", 8: "dinake", 9: "divwa", 10: "dikwinyi"
};
const DEZENAS_KB = {
  2: "makwinyi yadi", 3: "makwinyi tatu", 4: "makwinyi wana",
  5: "makwinyi tanu", 6: "makwinyi samanu", 7: "makwinyi sambwadi",
  8: "makwinyi dinake", 9: "makwinyi divwa"
};

function traduzirNumero(n) {
  if (n < 0 || n > 99 || !Number.isInteger(n)) return null;
  if (n <= 10) return NUMS_KB[n];
  if (n < 20) {
    // 11-19: dikwinyi ni [unidade]
    return `dikwinyi ni ${NUMS_KB[n - 10]}`;
  }
  const dezena = Math.floor(n / 10);
  const unidade = n % 10;
  if (unidade === 0) return DEZENAS_KB[dezena];
  return `${DEZENAS_KB[dezena]} ni ${NUMS_KB[unidade]}`;
}

function IdadeTradutor() {
  const [idade, setIdade] = useState('');
  const num = parseInt(idade, 10);
  const valido = !isNaN(num) && num >= 0 && num <= 99;
  const trad = valido ? traduzirNumero(num) : null;

  return (
    <section className="kb-idade-box">
      <h3 className="kb-section-title">Diz a tua idade em Kimbundu</h3>
      <p style={{color: 'var(--kb-mute)', fontSize: '0.88rem', margin: '0 0 1rem'}}>
        Escreve a tua idade (0–99) e vê como se diz em Kimbundu.
      </p>
      <div style={{display: 'flex', flexWrap: 'wrap', gap: '0.75rem', alignItems: 'flex-end'}}>
        <div className="kb-control-group">
          <label className="kb-label">A tua idade</label>
          <input
            className="kb-input"
            type="number"
            min="0"
            max="99"
            value={idade}
            onChange={(e) => setIdade(e.target.value)}
            placeholder="ex: 25"
            style={{minWidth: '120px'}}
          />
        </div>
      </div>
      {valido && (
        <div className="kb-idade-result">
          <div className="kb-idade-pt">
            Tenho <strong>{num}</strong> ano{num !== 1 ? 's' : ''}.
          </div>
          <div className="kb-idade-kb">
            <span>Eme ngala kya ni <strong>{trad}</strong> {num === 1 ? 'muvu' : 'mivu'}.</span>
            <SpeakButton text={`Eme ngala kya ni ${trad} ${num === 1 ? 'muvu' : 'mivu'}`} size="normal" />
          </div>
        </div>
      )}
      {idade && !valido && (
        <div style={{color: 'var(--kb-wrong)', marginTop: '0.75rem', fontSize: '0.88rem'}}>
          Por favor escreve um número entre 0 e 99.
        </div>
      )}
    </section>
  );
}
